<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
    }
    canvas {
      background: #222;
      margin-top: 20px;
      border: 2px solid white;
    }
    .controls {
      margin-top: 20px;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>🐍 Snake Game</h2>
<p>Use Arrow Keys or Touch Controls</p>
<p id="score">Score: 0</p>

<canvas id="game" width="400" height="400"></canvas>

<!-- 📱 Touch Buttons -->
<div class="controls">
  <div>
    <button onclick="setDirection('UP')">⬆️</button>
  </div>
  <div>
    <button onclick="setDirection('LEFT')">⬅️</button>
    <button onclick="setDirection('DOWN')">⬇️</button>
    <button onclick="setDirection('RIGHT')">➡️</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let box = 20;
let snake = [{ x: 200, y: 200 }];
let direction = "RIGHT";
let score = 0;

let food = randomFood();

// 🎮 Keyboard Controls
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") setDirection("LEFT");
  if (e.key === "ArrowUp") setDirection("UP");
  if (e.key === "ArrowRight") setDirection("RIGHT");
  if (e.key === "ArrowDown") setDirection("DOWN");
});

// 📱 Touch Button Controls
function setDirection(dir) {
  if (dir === "LEFT" && direction !== "RIGHT") direction = "LEFT";
  if (dir === "UP" && direction !== "DOWN") direction = "UP";
  if (dir === "RIGHT" && direction !== "LEFT") direction = "RIGHT";
  if (dir === "DOWN" && direction !== "UP") direction = "DOWN";
}

// 📱 Swipe Controls
let startX, startY;

canvas.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", (e) => {
  if (!startX || !startY) return;

  let dx = e.touches[0].clientX - startX;
  let dy = e.touches[0].clientY - startY;

  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) setDirection("RIGHT");
    else setDirection("LEFT");
  } else {
    if (dy > 0) setDirection("DOWN");
    else setDirection("UP");
  }

  startX = null;
  startY = null;
});

// 🍎 Food Generator
function randomFood() {
  return {
    x: Math.floor(Math.random() * 20) * box,
    y: Math.floor(Math.random() * 20) * box
  };
}

// 🐍 Draw Game
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Snake
  snake.forEach((part, i) => {
    ctx.fillStyle = i === 0 ? "lime" : "green";
    ctx.fillRect(part.x, part.y, box, box);
  });

  // Food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x, food.y, box, box);

  // Move
  let headX = snake[0].x;
  let headY = snake[0].y;

  if (direction === "LEFT") headX -= box;
  if (direction === "UP") headY -= box;
  if (direction === "RIGHT") headX += box;
  if (direction === "DOWN") headY += box;

  // Eat
  if (headX === food.x && headY === food.y) {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    food = randomFood();
  } else {
    snake.pop();
  }

  let newHead = { x: headX, y: headY };

  // 💥 Game Over
  if (
    headX < 0 || headY < 0 ||
    headX >= canvas.width || headY >= canvas.height ||
    snake.some(part => part.x === headX && part.y === headY)
  ) {
    clearInterval(game);
    alert("Game Over! Score: " + score);
  }

  snake.unshift(newHead);
}

// 🔁 Game Loop
let game = setInterval(draw, 120);
</script>

</body>
</html>
